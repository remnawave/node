[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=%(ENV_SUPERVISORD_PID_PATH)s
childlogdir=/var/log/supervisor
logfile_maxbytes=5MB
logfile_backups=2
loglevel=info
silent=true

[unix_http_server]
file = %(ENV_SUPERVISORD_SOCKET_PATH)s
username = %(ENV_SUPERVISORD_USER)s
password = %(ENV_SUPERVISORD_PASSWORD)s

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:xray]
command=/usr/local/bin/rw-core -config http+unix://%(ENV_INTERNAL_SOCKET_PATH)s/internal/get-config?token=%(ENV_INTERNAL_REST_TOKEN)s -format json
autostart=false
autorestart=false
startsecs=2
stderr_logfile=/var/log/supervisor/xray.err.log
stdout_logfile=/var/log/supervisor/xray.out.log
stdout_logfile_maxbytes=5MB
stderr_logfile_maxbytes=5MB
stdout_logfile_backups=0
stderr_logfile_backups=0

[program:veil]
; The Veil server reads server.yaml that the panel pushes through the
; node's POST /node/veil/start endpoint. autostart=false because the
; panel decides when to (re)start; autorestart=false because the
; panel itself probes /api/version and triggers a fresh start on
; failure (so we don't fight supervisord's exponential backoff during
; transport-config rollouts).
command=/usr/local/bin/veil serve --config /etc/veil/server.yaml
autostart=false
autorestart=false
startsecs=2
stderr_logfile=/var/log/supervisor/veil.err.log
stdout_logfile=/var/log/supervisor/veil.out.log
stdout_logfile_maxbytes=5MB
stderr_logfile_maxbytes=5MB
stdout_logfile_backups=0
stderr_logfile_backups=0
